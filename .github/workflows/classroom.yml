          TEST_CROSS_ENCODER_RERANK_ORDERS_BY_LOGITS_RESULTS: ${{ steps.test_cross_encoder_rerank_orders_by_logits.outputs.result }}
          TEST_TFIDF_RERANK_PREFERS_APPLE_DOCS_RESULTS: ${{ steps.test_tfidf_rerank_prefers_apple_docs.outputs.result }}
          TEST_BOW_RERANK_PREFERS_APPLE_DOCS_RESULTS: ${{ steps.test_bow_rerank_prefers_apple_docs.outputs.result }}
          TEST_SEQUENTIAL_RERANK_TWO_PHASE_PIPELINE_RESULTS: ${{ steps.test_sequential_rerank_two_phase_pipeline.outputs.result }}
          TEST_INITIALIZE_INDEX_RETURNS_OBJECT_RESULTS: ${{ steps.test_initialize_index_returns_object.outputs.result }}
          TEST_GENERATE_SUCCESS_BASIC_RESULTS: ${{ steps.test_generate_success_basic.outputs.result }}
          TEST_GENERATE_MISSING_JSON_RESULTS: ${{ steps.test_generate_missing_json.outputs.result }}
          TEST_GENERATE_EMPTY_QUERY_RESULTS: ${{ steps.test_generate_empty_query.outputs.result }}
          TEST_GENERATE_UNICODE_QUERY_RESULTS: ${{ steps.test_generate_unicode_query.outputs.result }}
          TEST_GENERATE_LONG_QUERY_RESULTS: ${{ steps.test_generate_long_query.outputs.result }}
          TEST_GENERATE_RETURNS_NONEMPTY_ANSWER_RESULTS: ${{ steps.test_generate_returns_nonempty_answer.outputs.result }}
        with:
          runners: test_basic_fixed_length,
            test_chunk_size_larger_than_text,
