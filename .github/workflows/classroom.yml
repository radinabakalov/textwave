name: Autograding Tests
'on':
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read


jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --user -r textwave/requirements.txt
          python -m nltk.downloader stopwords punkt wordnet


# === Assignment 8 Test Runners (type 1) ===

      - name: test_basic_fixed_length
        id: test_basic_fixed_length
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: test_basic_fixed_length
          command: MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }} python test/grade_runner.py test_basic_fixed_length 1
          timeout: 20
          max-score: 5

      - name: test_chunk_size_larger_than_text
